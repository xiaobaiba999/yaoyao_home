yaoyao:
  jwt:
    secret: ${JWT_SECRET:yaoyao-memorial-secret-key-2024-hmac-sha256}
    expires-in: 604800000
  admin:
    username: yaoyao
    password: ${ADMIN_PASSWORD:yaoyao20230228}
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    access-key-secret: ${R2_ACCESS_KEY_SECRET:}
    bucket-name: ${R2_BUCKET_NAME:}
    public-url: ${R2_PUBLIC_URL:}
    path-prefix: ${R2_PATH_PREFIX:photos}
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:}
    url-prefix: ${OSS_URL_PREFIX:}
    path-prefix: ${OSS_PATH_PREFIX:photos}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://yaoyao-memorial.vercel.app}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:yaoyao_memorial}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${PORT:3000}
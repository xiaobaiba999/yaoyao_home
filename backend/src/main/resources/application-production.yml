    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

yaoyao:
  jwt:
    secret: ${JWT_SECRET:yaoyao-memorial-secret-key-2024-production}
    expires-in: 604800000
  admin:
    username: ${ADMIN_USERNAME:yaoyao}
    password: ${ADMIN_PASSWORD:yaoyao20230228}
  gitee:
    access-token: ${GITEE_ACCESS_TOKEN:}
    owner: ${GITEE_OWNER:}
    repo: ${GITEE_REPO:}
    base-url: https://gitee.com/api/v5
    raw-url: https://gitee.com
    path: images
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yaoyao-home.vercel.app,https://yaoyao-home-git-main-xiaobaiba999s-projects.vercel.app}

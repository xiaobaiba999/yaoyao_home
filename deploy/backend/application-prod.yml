server:
  port: 3000

spring:
  application:
    name: yaoyao-memorial
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yaoyao_memorial?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

yaoyao:
  jwt:
    secret: ${JWT_SECRET}
    expires-in: 604800000
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  gitee:
    access-token: ${GITEE_ACCESS_TOKEN}
    owner: ${GITEE_OWNER}
    repo: ${GITEE_REPO}
    base-url: https://gitee.com/api/v5
    raw-url: https://gitee.com
    path: images
  cors:
    allowed-origins: https://liyaoyao.top,https://www.liyaoyao.top

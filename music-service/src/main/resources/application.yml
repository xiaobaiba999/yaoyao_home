server:
  port: 8088

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/music_service?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

music:
  storage-path: ${MUSIC_STORAGE_PATH:./music-files}
  max-size: 52428800
  base-url: ${MUSIC_BASE_URL:}
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:}
    url-prefix: ${OSS_URL_PREFIX:}
    path-prefix: ${OSS_PATH_PREFIX:music}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
